<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="100" height="100" viewBox="0 0 100 100">
  <defs>
    <g id="star">
      <path d="M20,0 10.16,4.21 14.14,14.14 4.21,10.16 0,20 -4.21,10.16 -14.14,14.14 -10.16,4.21 -20,0 -10.16,-4.21 -14.14,-14.14 -4.21,-10.16 0,-20 4.21,-10.16 14.14,-14.14 10.16,-4.21 Z" fill="#ffffff" stroke="#E0912A" stroke-width="2.2"/>
      <circle r="2.4" fill="#E0912A"/>
    </g>
  </defs>
  <!-- diagonal lattice connecting the stars (stars sit on the crossings) -->
  <path d="M0,0 100,100 M100,0 0,100" stroke="#E0912A" stroke-width="2.2" fill="none"/>
  <!-- small accent dots on the tile edges (shared with neighbours) -->
  <g fill="#E0912A">
    <circle cx="50" cy="0" r="1.8"/>
    <circle cx="0" cy="50" r="1.8"/>
    <circle cx="100" cy="50" r="1.8"/>
    <circle cx="50" cy="100" r="1.8"/>
  </g>
  <!-- 8-pointed stars: centre + four corners (corners are shared → seamless) -->
  <use xlink:href="#star" href="#star" transform="translate(50,50)"/>
  <use xlink:href="#star" href="#star" transform="translate(0,0)"/>
  <use xlink:href="#star" href="#star" transform="translate(100,0)"/>
  <use xlink:href="#star" href="#star" transform="translate(0,100)"/>
  <use xlink:href="#star" href="#star" transform="translate(100,100)"/>
</svg>
