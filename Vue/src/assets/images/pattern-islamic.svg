<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="100" height="100" viewBox="0 0 100 100">
  <defs>
    <g id="s">
      <path d="M9,0 4.62,1.91 6.36,6.36 1.91,4.62 0,9 -1.91,4.62 -6.36,6.36 -4.62,1.91 -9,0 -4.62,-1.91 -6.36,-6.36 -1.91,-4.62 0,-9 1.91,-4.62 6.36,-6.36 4.62,-1.91 Z" fill="none" stroke="#E0912A" stroke-width="1.4"/>
      <circle r="1" fill="#E0912A"/>
    </g>
  </defs>
  <!-- fine scattered small stars (no heavy lattice → far less "boxy") -->
  <use xlink:href="#s" href="#s" transform="translate(25,25)"/>
  <use xlink:href="#s" href="#s" transform="translate(75,25)"/>
  <use xlink:href="#s" href="#s" transform="translate(25,75)"/>
  <use xlink:href="#s" href="#s" transform="translate(75,75)"/>
  <!-- delicate dot grid between the stars (edges shared → seamless) -->
  <g fill="#E0912A">
    <circle cx="0" cy="0" r="1.3"/><circle cx="50" cy="0" r="1.3"/><circle cx="100" cy="0" r="1.3"/>
    <circle cx="0" cy="50" r="1.3"/><circle cx="50" cy="50" r="1.3"/><circle cx="100" cy="50" r="1.3"/>
    <circle cx="0" cy="100" r="1.3"/><circle cx="50" cy="100" r="1.3"/><circle cx="100" cy="100" r="1.3"/>
  </g>
</svg>
