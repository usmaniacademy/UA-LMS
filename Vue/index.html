<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="/favicon.ico">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700&family=Roboto:wght@400;500;700&display=swap">
  <!-- Google Sans -->
  <link rel="stylesheet" href="https://fonts.cdnfonts.com/css/google-sans">
  <title>Usmani Academy - Teaching and Learning for Understanding</title>

  <style>
    #splash-screen {
      position: fixed;
      inset: 0;
      z-index: 99999;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f766e 0%, #065f46 100%);
      overflow: hidden;
      will-change: transform;
      transition: transform 0.9s cubic-bezier(0.76, 0, 0.24, 1);
    }

    #splash-screen .splash-logo {
      height: 104px;
      max-width: 74%;
      object-fit: contain;
      opacity: 0;
      transform: scale(0.82) translateY(14px);
      animation: uaLogoIn 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.2s forwards;
    }

    @keyframes uaLogoIn {
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    /* Curtain reveal — the whole panel lifts up to unveil the site */
    #splash-screen.reveal {
      transform: translateY(-100%);
    }

    #splash-screen.reveal .splash-logo {
      animation: uaLogoOut 0.45s ease forwards;
    }

    @keyframes uaLogoOut {
      to {
        opacity: 0;
        transform: scale(1.14);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      #splash-screen {
        transition: opacity 0.5s linear;
      }
      #splash-screen .splash-logo {
        animation: none;
        opacity: 1;
        transform: none;
      }
      #splash-screen.reveal {
        transform: none;
        opacity: 0;
      }
    }
  </style>
</head>

<body>
  <div id="app"></div>
  <div id="splash-screen">
    <img class="splash-logo" alt="Usmani Academy" src="/src/assets/images/ua-logo-light.png.png" />
  </div>
  <script type="module" src="/src/main.ts"></script>
  <script>
    (function () {
      var start = Date.now();
      var MIN_MS = 1500; // keep the intro on screen at least this long
      var appEl = document.querySelector('#app');
      var done = false;
      function reveal() {
        if (done) return;
        done = true;
        var el = document.getElementById('splash-screen');
        if (!el) return;
        el.classList.add('reveal');
        try { window.dispatchEvent(new Event('ua-splash-reveal')); } catch (e) {}
        setTimeout(function () { if (el.parentNode) el.parentNode.removeChild(el); }, 1000);
      }
      var obs = new MutationObserver(function () {
        obs.disconnect();
        setTimeout(reveal, Math.max(0, MIN_MS - (Date.now() - start)));
      });
      if (appEl) obs.observe(appEl, { childList: true });
      setTimeout(reveal, 5000); // safety fallback
    })();
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sticky-js/1.3.0/sticky.min.js"
    integrity="sha512-3z3zGiu0PabNyuTAAfznBJFpOg4owG9oQQasE5BwiiH5BBwrAjbfgIe0RCdtHJ0BQV1YF2Shgokbz2NziLnkuQ=="
    crossorigin="anonymous" referrerpolicy="no-referrer"></script>
</body>

</html>
